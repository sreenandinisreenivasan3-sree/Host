services:
  - type: web
    name: campus-placement-predictor
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install wheel setuptools
      pip install --only-binary :all: pandas numpy
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0