<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Placement Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        
        input, select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .probability {
            margin-top: 10px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Campus Placement Predictor</h1>
        
        <form action="/predict" method="post">
            <div class="form-grid">
                <!-- Personal Information -->
                <div class="form-group">
                    <label>Gender:</label>
                    <select name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" name="age" min="18" max="30" value="21" required>
                </div>
                
                <div class="form-group">
                    <label>City Tier:</label>
                    <select name="city_tier" required>
                        <option value="1">Tier 1</option>
                        <option value="2">Tier 2</option>
                        <option value="3">Tier 3</option>
                    </select>
                </div>
                
                <!-- Academic Information -->
                <div class="form-group">
                    <label>SSC Percentage:</label>
                    <input type="number" name="ssc_percentage" min="0" max="100" step="0.01" value="70" required>
                </div>
                
                <div class="form-group">
                    <label>SSC Board:</label>
                    <select name="ssc_board" required>
                        <option value="Central">Central</option>
                        <option value="State">State</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>HSC Percentage:</label>
                    <input type="number" name="hsc_percentage" min="0" max="100" step="0.01" value="70" required>
                </div>
                
                <div class="form-group">
                    <label>HSC Board:</label>
                    <select name="hsc_board" required>
                        <option value="Central">Central</option>
                        <option value="State">State</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>HSC Stream:</label>
                    <select name="hsc_stream" required>
                        <option value="Science">Science</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Arts">Arts</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Degree Percentage:</label>
                    <input type="number" name="degree_percentage" min="0" max="100" step="0.01" value="70" required>
                </div>
                
                <div class="form-group">
                    <label>Degree Field:</label>
                    <select name="degree_field" required>
                        <option value="Sci&Tech">Sci&Tech</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Arts">Arts</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>MBA Percentage:</label>
                    <input type="number" name="mba_percentage" min="0" max="100" step="0.01" value="70" required>
                </div>
                
                <div class="form-group">
                    <label>Specialization:</label>
                    <select name="specialization" required>
                        <option value="Marketing & HR">Marketing & HR</option>
                        <option value="Marketing & Finance">Marketing & Finance</option>
                        <option value="Finance & HR">Finance & HR</option>
                    </select>
                </div>
                
                <!-- Experience & Skills -->
                <div class="form-group">
                    <label>Work Experience (months):</label>
                    <input type="number" name="work_experience_months" min="0" max="60" value="0" required>
                </div>
                
                <div class="form-group">
                    <label>Internships Count:</label>
                    <input type="number" name="internships_count" min="0" max="10" value="1" required>
                </div>
                
                <div class="form-group">
                    <label>Projects Count:</label>
                    <input type="number" name="projects_count" min="0" max="20" value="2" required>
                </div>
                
                <div class="form-group">
                    <label>Certifications Count:</label>
                    <input type="number" name="certifications_count" min="0" max="20" value="1" required>
                </div>
                
                <div class="form-group">
                    <label>Technical Skills Score (1-10):</label>
                    <input type="number" name="technical_skills_score" min="1" max="10" step="0.1" value="6" required>
                </div>
                
                <div class="form-group">
                    <label>Communication Score (1-10):</label>
                    <input type="number" name="communication_score" min="1" max="10" step="0.1" value="6" required>
                </div>
                
                <div class="form-group">
                    <label>Soft Skills Score (1-10):</label>
                    <input type="number" name="soft_skills_score" min="1" max="10" step="0.1" value="6" required>
                </div>
                
                <div class="form-group">
                    <label>Leadership Roles (0-5):</label>
                    <input type="number" name="leadership_roles" min="0" max="5" value="1" required>
                </div>
                
                <div class="form-group">
                    <label>Extracurricular Activities (0-10):</label>
                    <input type="number" name="extracurricular_activities" min="0" max="10" value="2" required>
                </div>
                
                <div class="form-group">
                    <label>Backlogs:</label>
                    <input type="number" name="backlogs" min="0" max="10" value="0" required>
                </div>
                
                <div class="form-group">
                    <label>Aptitude Score (0-100):</label>
                    <input type="number" name="aptitude_score" min="0" max="100" value="60" required>
                </div>
            </div>
            
            <button type="submit">Predict Placement</button>
        </form>
        
        {% if prediction_text %}
        <div class="result {% if 'Placed' in prediction_text %}success{% else %}error{% endif %}">
            {{ prediction_text }}
            {% if probability_text %}
            <div class="probability">{{ probability_text }}</div>
            {% endif %}
        </div>
        {% endif %}
    </div>
</body>
</html>
